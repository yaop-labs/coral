pipeline:
  workers: 0
  queue_size: 10000

receivers:
  otlp_grpc:
    endpoint: "0.0.0.0:4317"
    insecure: true # replace with TLS outside development

processors:
  - type: validate
  - type: tail_sampling
    decision_wait: 30s
    max_traces: 100000
    default_keep_rate: 0.05
    rules:
      - type: error
      - type: debug_tag
  - type: batch
    max_size: 1024
    timeout: 2s

exporters:
  - type: s3
    bucket: "yaop-traces"
    region: "eu-central-1"
    prefix: "collector/"
    format: "jsonl"
    retry:
      max_attempts: 5
      initial_backoff: 200ms
      max_backoff: 10s

metrics:
  endpoint: "0.0.0.0:4888"
  insecure: true # replace with TLS outside development
