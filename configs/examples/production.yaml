# Gate 4 production profile. All paths are examples; keep credentials outside
# the config directory and rotate the referenced files atomically.
journal_path: /var/lib/coral/journal
journal_max_bytes: 10737418240

pipeline:
  workers: 4
  queue_size: 10000
  queue_bytes: 1073741824

receivers:
  otlp_grpc:
    endpoint: "0.0.0.0:4317"
    tls:
      enabled: true
      cert_file: /etc/coral/tls/server.crt
      key_file: /etc/coral/tls/server.key
      client_ca_file: /etc/coral/tls/clients-ca.crt
      min_version: "1.3"
    auth:
      bearer:
        - name: wisp
          token_file: /etc/coral/credentials/wisp.token
  otlp_http:
    endpoint: "0.0.0.0:4318"
    tls:
      enabled: true
      cert_file: /etc/coral/tls/server.crt
      key_file: /etc/coral/tls/server.key
      client_ca_file: /etc/coral/tls/clients-ca.crt
      min_version: "1.3"
    auth:
      bearer:
        - name: wisp
          token_file: /etc/coral/credentials/wisp.token

exporters:
  - type: amber
    endpoint: "https://amber.example.internal:5318"
    tls:
      enabled: true
      ca_file: /etc/coral/tls/amber-ca.crt
      server_name: amber.example.internal
    auth:
      token_file: /etc/coral/credentials/amber.token
    timeout: 5s
    retry:
      max_attempts: 5
      initial_backoff: 100ms
      max_backoff: 10s

metrics:
  endpoint: "127.0.0.1:4888"
  tls:
    enabled: true
    cert_file: /etc/coral/tls/metrics.crt
    key_file: /etc/coral/tls/metrics.key
  auth:
    bearer:
      - name: ops
        token_file: /etc/coral/credentials/ops.token

# Jaeger/Zipkin listeners are intentionally absent from the production profile.
