# Local real-pair gate: Amber's development HTTP API on :8080, Coral on :4320.
# Bindings are loopback-only and intentionally insecure for this harness.
pipeline:
  workers: 1
  queue_size: 128
  queue_bytes: 16777216

receivers:
  otlp_http:
    endpoint: "127.0.0.1:4320"
    insecure: true

exporters:
  - type: amber
    endpoint: "http://127.0.0.1:8080"
    insecure: true
    timeout: 5s
    retry:
      max_attempts: 2
      initial_backoff: 50ms
      max_backoff: 500ms

metric_pipeline:
  exporter:
    type: amber
    endpoint: "http://127.0.0.1:8080"
    insecure: true

log_pipeline:
  exporter:
    type: amber
    endpoint: "http://127.0.0.1:8080"
    insecure: true
