agent:
  log_level: info
  self_metrics:
    endpoint: "127.0.0.1:19090"
sources:
  host:
    interval: 1s
    collectors: [cpu, memory]
exporter:
  otlp:
    endpoint: "127.0.0.1:4320"
    protocol: http
    insecure: true
    timeout: 2s
    retry:
      max_attempts: 3
      initial_backoff: 50ms
      max_backoff: 500ms
  spool:
    dir: "/tmp/wisp-gate4-spool"
    max_bytes: 67108864
resource:
  attributes:
    service.name: "wisp-gate4"
